events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server localhost:8001;
    }
    
    upstream workout_service {
        server localhost:8002;
    }
    
    upstream diet_service {
        server localhost:8003;
    }
    
    upstream progress_service {
        server localhost:8004;
    }
    
    upstream nutrition_service {
        server localhost:8005;
    }
    
    upstream notification_service {
        server localhost:8006;
    }
    
    upstream tips_service {
        server localhost:8007;
    }
    
    server {
        listen 8000;
        server_name localhost;
        
        # User Service Routes
        location /users/ {
            proxy_pass http://user_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Workout Service Routes
        location /workout/ {
            proxy_pass http://workout_service/api/workouts/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Diet Service Routes
        location /diet/ {
            proxy_pass http://diet_service/api/diet-plans/;
            proxy_set_header Host $host;
        }
        
        # Progress Service Routes
        location /progress/ {
            proxy_pass http://progress_service/api/progress/;
            proxy_set_header Host $host;
        }
        
        # Nutrition Service Routes
        location /nutrition/ {
            proxy_pass http://nutrition_service/api/supplements/;
            proxy_set_header Host $host;
        }
        
        # Notification Service Routes
        location /notifications/ {
            proxy_pass http://notification_service/api/notifications/;
            proxy_set_header Host $host;
        }
        
        # Tips Service Routes
        location /tips/ {
            proxy_pass http://tips_service/api/tips/;
            proxy_set_header Host $host;
        }
        
        # Swagger Documentation Routes
        location /docs/users/ {
            proxy_pass http://user_service/swagger/;
        }
        
        location /docs/workout/ {
            proxy_pass http://workout_service/swagger/;
        }
        
        location /docs/diet/ {
            proxy_pass http://diet_service/swagger/;
        }
        
        location /docs/progress/ {
            proxy_pass http://progress_service/swagger/;
        }
        
        location /docs/nutrition/ {
            proxy_pass http://nutrition_service/swagger/;
        }
        
        location /docs/notifications/ {
            proxy_pass http://notification_service/swagger/;
        }
        
        location /docs/tips/ {
            proxy_pass http://tips_service/swagger/;
        }
    }
}